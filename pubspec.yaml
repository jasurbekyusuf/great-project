name: loadme_mobile
description: Loadme native mobile app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Network + storage
  dio: ^5.7.0
  shared_preferences: ^2.5.1
  flutter_secure_storage: ^9.2.2
  connectivity_plus: ^6.1.1

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7

  # Utilities
  collection: ^1.19.1
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

  # Typography (Inter via Google Fonts, cached after first launch)
  google_fonts: ^6.2.1

  # Senior-architect foundation
  fpdart: ^1.1.0          # Result/Either, Option — explicit error handling
  logger: ^2.4.0          # structured logging (replaces debugPrint)
  get_it: ^7.7.0          # service locator for DI

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Strict lints
  very_good_analysis: ^6.0.0

  # Code generation
  build_runner: ^2.4.15
  freezed: ^2.5.8
  json_serializable: ^6.9.3

  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/l10n/
    - assets/images/
