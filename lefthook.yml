# Lefthook pre-commit hooks: https://github.com/evilmartians/lefthook
# Install once:   `dart pub global activate lefthook && lefthook install`
# Or via npm:     `npm install -g lefthook && lefthook install`

pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.dart"
      run: dart format --line-length=100 --set-exit-if-changed {staged_files}
    analyze:
      run: flutter analyze --no-pub --fatal-infos --fatal-warnings

pre-push:
  commands:
    test:
      run: flutter test
